# 服务器端口
server:
  port: 8080

# MySQL 数据源配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/postgraduate_admission?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 20050530
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis:
  # 实体类包路径
  type-aliases-package: com.admission.entity
  # SQL映射文件路径
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 开启驼峰命名转换（数据库字段 exam_id → 实体属性 examId）
    map-underscore-to-camel-case: true
    # 开启SQL日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl